name: OAuth2 Tests

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/oauth2-tests.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - 'src/**'
      - "tests/**"
  pull_request: {}
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  oauth2-tests-stable:
    name: OAuth2 tests (stable, RabbitMQ ${{ matrix.rabbitmq-series }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        rabbitmq-series:
          - "4.1"
          - "4.2"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Generate RSA signing keys and Erlang cookie
        run: |
          mkdir -p tests/oauth2/keys
          openssl genpkey -algorithm RSA -out tests/oauth2/keys/signing_key.pem \
            -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in tests/oauth2/keys/signing_key.pem \
            -out tests/oauth2/keys/signing_key_pub.pem
          echo 'oauth2-test-cookie' > tests/oauth2/keys/.erlang.cookie
          chmod 600 tests/oauth2/keys/.erlang.cookie
          sudo chown 999:999 tests/oauth2/keys/.erlang.cookie

      - name: Start RabbitMQ
        run: |
          docker run -d --name rabbitmq-oauth2 \
            --hostname rabbitmq-oauth2 \
            -p 5680:5672 \
            -v ${{ github.workspace }}/tests/oauth2/keys/signing_key_pub.pem:/etc/rabbitmq/signing_key_pub.pem:ro \
            -v ${{ github.workspace }}/tests/oauth2/keys/.erlang.cookie:/var/lib/rabbitmq/.erlang.cookie \
            rabbitmq:${{ matrix.rabbitmq-series }}

      - name: Wait for RabbitMQ to start
        run: |
          for i in $(seq 1 60); do
            if docker exec rabbitmq-oauth2 rabbitmqctl await_startup --timeout 60; then
              echo "RabbitMQ is ready"
              exit 0
            fi
            echo "Waiting for container... ($i/60)"
            sleep 2
          done
          echo "RabbitMQ failed to start. Container logs:"
          docker logs rabbitmq-oauth2
          exit 1

      - name: Configure OAuth2
        run: |
          docker exec rabbitmq-oauth2 rabbitmq-plugins enable rabbitmq_auth_backend_oauth2
          docker exec rabbitmq-oauth2 rabbitmqctl eval '
            application:set_env(rabbit, auth_backends, [rabbit_auth_backend_oauth2, rabbit_auth_backend_internal]),
            application:set_env(rabbitmq_auth_backend_oauth2, resource_server_id, <<"rabbitmq">>),
            application:set_env(rabbitmq_auth_backend_oauth2, preferred_username_claims, [<<"sub">>]),
            application:set_env(rabbitmq_auth_backend_oauth2, key_config,
              [{signing_keys, #{<<"test-key">> => {pem, element(2, file:read_file(<<"/etc/rabbitmq/signing_key_pub.pem">>))}}},
               {default_key, <<"test-key">>}]).
          '

      - name: Verify OAuth2 plugin is enabled
        run: docker exec rabbitmq-oauth2 rabbitmq-plugins list -e | grep oauth2

      - name: Run OAuth2 tests
        env:
          RUN_OAUTH2_TESTS: "1"
          OAUTH2_SIGNING_KEY_PATH: ${{ github.workspace }}/tests/oauth2/keys/signing_key.pem
          OAUTH2_RABBITMQ_PORT: "5680"
        run: |
          RUSTFLAGS="-D warnings" cargo nextest run --all-features -E 'test(oauth2)'

      - name: Stop RabbitMQ container
        if: always()
        run: docker stop rabbitmq-oauth2 && docker rm rabbitmq-oauth2 || true

  oauth2-tests-beta:
    name: OAuth2 tests (beta, RabbitMQ ${{ matrix.rabbitmq-series }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
